name: Build Plugin
on: push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    - name: Build with Maven
      run: mvn package
    - name: Upload jar
      uses: actions/upload-artifact@v4
      with:
        name: FakeBot-1.21.10
        path: target/*.jar
